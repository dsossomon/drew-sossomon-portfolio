<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Drew Sossomon | Soccer Gallery</title>

    <style>
        /* PAGE RESET */
        body {
            margin: 0;
            font-family: 'Outfit', sans-serif;
            background: #f5f5f5;
        }

        /* GALLERY PAGE HEADER */
        .gallery-header {
            text-align: center;
            padding: 40px 20px;
            background: #111;
            color: white;
        }

        .gallery-header h1 {
            font-size: 2.8rem;
            margin-bottom: 10px;
            letter-spacing: 1px;
            font-family: 'Big Shoulders Display', sans-serif;
        }

        .gallery-header p {
            font-size: 1rem;
            color: #ccc;
        }

        /* GALLERY GRID */
        .gallery-grid {
            width: 90%;
            max-width: 1200px;
            margin: 40px auto;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            gap: 20px;
        }

        /* IMAGES */
        .gallery-grid img {
            width: 100%;
            height: 260px;
            object-fit: cover;
            border-radius: 12px;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .gallery-grid img:hover {
            transform: scale(1.03);
            box-shadow: 0 8px 20px rgba(0,0,0,0.25);
        }

        /* CAPTIONED PHOTO */
        .photo-with-caption {
            display: flex;
            flex-direction: column;
        }

        .photo-with-caption img {
            width: 100%;
            height: 260px;
            object-fit: cover;
            border-radius: 12px;
        }

        .caption {
            margin-top: 8px;
            font-size: 0.9rem;
            color: #555;
            text-align: center;
        }
    </style>
</head>

<body>

    <!-- PAGE HEADER -->
    <header class="gallery-header">
        <h1>My Soccer Gallery</h1>
        <p>A curated collection of my favorite moments on and off the field.</p>
    </header>

    <!-- GALLERY GRID -->
    <section class="gallery-grid">

        <!-- Add as many images as you want -->
        <img src="0213E62C-5B69-4A73-971E-0D9B61F3B76A.jpg" alt="">

        <div class="photo-with-caption">
            <img src="20250110_115306.jpg" alt="">
            <p class="caption">Recovery phase — cast used to stretch left leg muscles.</p>
        </div>

        <img src="IMG_20250823_150507 (1).jpg" alt="">
        <img src="IMG_20250823_150507 (2).jpg" alt="">
        <img src="IMG_9313.jpg" alt="">

        <!-- Add more like this -->
        <!-- <img src="your-photo.jpg" alt=""> -->

    </section>

</body>
</html>
