<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Drew Sossomon | Soccer Gallery</title>

    <style>
        :root {
            --energy-blue: #00aaff;
            --navy-card: #0a0f24;
            --text-muted: #9aa0b2;
            --white: #ffffff;
        }

        body {
            margin: 0;
            font-family: 'Outfit', sans-serif;
            background: #0d122b;
            color: var(--white);
        }

        /* HEADER */
        .gallery-header {
            text-align: center;
            padding: 50px 20px;
            background: var(--navy-card);
            border-bottom: 4px solid var(--energy-blue);
        }

        .gallery-header h1 {
            font-size: 3rem;
            margin-bottom: 10px;
            font-family: 'Big Shoulders Display', sans-serif;
            color: var(--energy-blue);
            letter-spacing: 2px;
        }

        .gallery-header p {
            font-size: 1.1rem;
            color: var(--text-muted);
        }

        /* BACK BUTTON */
        .back-btn {
            display: inline-block;
            margin-top: 25px;
            padding: 12px 22px;
            background: var(--energy-blue);
            color: var(--white);
            text-decoration: none;
            border-radius: 6px;
            font-weight: 700;
            transition: 0.3s ease;
        }

        .back-btn:hover {
            background: #0088cc;
            transform: translateY(-2px);
        }

        /* GALLERY GRID */
        .gallery-grid {
            width: 90%;
            max-width: 1300px;
            margin: 50px auto;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 25px;
        }

        /* IMAGE STYLING */
        .gallery-grid img {
            width: 100%;
            height: 300px;
            object-fit: cover;
            border-radius: 14px;
            box-shadow: 0 0 20px rgba(0, 170, 255, 0.15);
            transition: 0.35s ease;
        }

        .gallery-grid img:hover {
            transform: scale(1.05);
            box-shadow: 0 0 25px rgba(0, 170, 255, 0.45);
            filter: brightness(1.15);
        }

        /* CAPTIONED PHOTO */
        .photo-with-caption {
            display: flex;
            flex-direction: column;
        }

        .caption {
            margin-top: 10px;
            font-size: 0.95rem;
            color: var(--text-muted);
            text-align: center;
        }
    </style>
</head>

<body>

    <!-- HEADER -->
    <header class="gallery-header">
        <h1>My Soccer Gallery</h1>
        <p>A cool collection of my best soccer moments —  matches, recovery, and more.</p>

        <a href="index.html" class="back-btn">← Back to Home</a>
    </header>

    <!-- GALLERY -->
    <section class="gallery-grid">

        <img src="0213E62C-5B69-4A73-971E-0D9B61F3B76A.jpg" alt="">

        <div class="photo-with-caption">
            <img src="20250110_115306.jpg" alt="">
            <p class="caption">Recovery phase — cast used to stretch left leg muscles when I was 5 years old .</p>
        </div>

        <img src="IMG_20250823_150507 (1).jpg" alt="">
        <img src="IMG_20250823_150507 (2).jpg" alt="">
        <img src="IMG_9313.jpg" alt="">

        <!-- Add more images here -->
        <!-- <img src="your-photo.jpg" alt=""> -->

    </section>

</body>
</html>
