<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GK Analytics Dashboard</title>
    
    <link rel="stylesheet" href="style.css">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

<div class="dashboard-container">
    <header>
        <h1><i class="fas fa-chart-bar"></i> Goalkeeper Performance Analytics</h1>
        <p>Input your match data to calculate your season averages.</p>
    </header>

    <main class="analytics-grid">
        <section class="input-card">
            <h3>Enter Match Stats</h3>
            <div class="input-group">
                <label>Minutes Played:</label>
                <input type="number" id="minutesPlayed" placeholder="e.g. 900">
                
                <label>Goals Against:</label>
                <input type="number" id="goalsAgainst" placeholder="e.g. 10">
                
                <label>Total Saves:</label>
                <input type="number" id="saves" placeholder="e.g. 45">
                
                <label>Shots on Goal Faced:</label>
                <input type="number" id="shotsOnGoal" placeholder="e.g. 55">
                
                <label>Games Played:</label>
                <input type="number" id="gamesPlayed" placeholder="e.g. 10">
                
                <label>Clean Sheets:</label>
                <input type="number" id="cleanSheets" placeholder="e.g. 4">
                
                <button onclick="calculateGKStats()" class="calc-btn">Calculate My Stats</button>
            </div>
        </section>

        <section class="results-card">
            <h3>Calculated Metrics</h3>
            <div class="stat-item">
                <span>GAA (Goals Against Avg):</span>
                <strong id="gaaResult">0.00</strong>
            </div>
            <div class="stat-item">
                <span>Save Percentage:</span>
                <strong id="svResult">0%</strong>
            </div>
            <div class="stat-item">
                <span>Clean Sheet %:</span>
                <strong id="csResult">0%</strong>
            </div>
        </section>
    </main>
</div>

<script>
    // Your JavaScript Logic
    function calculateGKStats() {
        let goals = parseFloat(document.getElementById("goalsAgainst").value) || 0;
        let minutes = parseFloat(document.getElementById("minutesPlayed").value) || 0;
        let saves = parseFloat(document.getElementById("saves").value) || 0;
        let shots = parseFloat(document.getElementById("shotsOnGoal").value) || 0;
        let cleanSheets = parseFloat(document.getElementById("cleanSheets").value) || 0;
        let games = parseFloat(document.getElementById("gamesPlayed").value) || 0;

        // GAA (Goals * 90 / Minutes)
        if (minutes > 0) {
            let gaa = (goals * 90) / minutes;
            document.getElementById("gaaResult").textContent = gaa.toFixed(2);
        }

        // Save Percentage (Saves / Shots * 100)
        if (shots > 0) {
            let sv = (saves / shots) * 100;
            document.getElementById("svResult").textContent = sv.toFixed(1) + "%";
        }

        // Clean Sheet Percentage (CS / Games * 100)
        if (games > 0) {
            let cs = (cleanSheets / games) * 100;
            document.getElementById("csResult").textContent = cs.toFixed(1) + "%";
        }
    }
</script>

</body>
</html>
