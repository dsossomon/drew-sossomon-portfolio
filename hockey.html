<!DOCTYPE html>
<html>
<head>
<title>College Hockey 5v5 Pro</title>
<style>
    body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: radial-gradient(circle at top, #1b2b4a, #050814);
        color: #ecf0f1;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
    }

    #app {
        width: 100%;
        max-width: 1200px;
        height: 100%;
        max-height: 700px;
        background: linear-gradient(135deg, #050814, #0b1224);
        border-radius: 18px;
        box-shadow: 0 0 35px rgba(0,0,0,0.7);
        position: relative;
        overflow: hidden;
        display: flex;
        flex-direction: column;
        border: 1px solid rgba(255,255,255,0.08);
    }

    #topBar {
        height: 56px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 18px;
        background: rgba(0,0,0,0.7);
        border-bottom: 1px solid rgba(255,255,255,0.08);
    }

    #viewContainer {
        flex: 1;
        overflow-y: auto;
    }

    .view {
        padding: 20px;
        display: none;
    }

    .activeView {
        display: block;
    }

    /* FIXED CANVAS — ALWAYS FITS */
    #gameCanvas {
        width: 100%;
        height: auto;
        max-width: 900px;
        max-height: 450px;
        background: #e8f4ff;
        border-radius: 18px;
        border: 8px solid #1a3a6e;
        display: block;
        margin: 0 auto;
    }

    #viewGame {
        text-align: center;
    }

    #scoreboard {
        font-size: 22px;
        margin-bottom: 6px;
    }

    #periodInfo {
        font-size: 14px;
        margin-bottom: 8px;
    }

    #controlsHint {
        margin-top: 6px;
        font-size: 13px;
        opacity: 0.85;
    }

    .teamButton {
        width: 100%;
        padding: 12px;
        margin: 6px 0;
        border-radius: 12px;
        border: none;
        cursor: pointer;
        color: white;
        font-size: 16px;
        text-align: left;
    }

    .playerRow {
        padding: 6px;
        background: rgba(255,255,255,0.05);
        border-radius: 8px;
        margin-bottom: 4px;
        display: flex;
        justify-content: space-between;
    }

    .promoteBtn {
        padding: 4px 8px;
        border-radius: 8px;
        border: none;
        background: #1abc9c;
        color: white;
        cursor: pointer;
    }
</style>
</head>
<body>

<div id="app">
    <div id="topBar">
        <div>College Hockey 5v5</div>
        <div id="seasonStats">Season: W 0 - L 0 - T 0</div>
        <div>
            <button onclick="alert('Home link here')">Home</button>
            <button onclick="alert('Portfolio link here')">Portfolio</button>
        </div>
    </div>

    <div id="viewContainer">

        <!-- TEAM SELECT -->
        <div id="viewTeams" class="view activeView">
            <h1>Select Your Team</h1>
            <div id="teamSelectList"></div>
        </div>

        <!-- ROSTER -->
        <div id="viewRoster" class="view">
            <h1 id="rosterTeamName"></h1>
            <h3>Roster</h3>
            <div id="rosterList"></div>

            <h3>Youth Academy</h3>
            <div id="youthList"></div>

            <button onclick="startSeason()">Start Season</button>
            <button onclick="showView('viewTeams')">Back</button>
        </div>

        <!-- GAME -->
        <div id="viewGame" class="view">
            <div id="scoreboard"></div>
            <div id="periodInfo"></div>
            <canvas id="gameCanvas"></canvas>
            <div id="controlsHint">Arrow keys move your player</div>
            <button onclick="showView('viewRoster')">Back to Roster</button>
        </div>

    </div>
</div>

<script>
// ------------------ TEAM DATA ------------------
const teams = [
    {name:"Drew University", color:"#003366"},
    {name:"NC State", color:"red"},
    {name:"Duke", color:"#0033A0"},
    {name:"UNC", color:"#4B9CD3"}
];

let selectedTeam = null;
let selectedRoster = [];
let youthPlayers = [];

function createPlayer(pos, youth=false) {
    const names = ["Mason","Ethan","Noah","Liam","Aiden","Logan","Caleb","Owen"];
    return {
        name: names[Math.floor(Math.random()*names.length)] + " Johnson",
        position: pos,
        speed: 60 + Math.random()*40,
        shooting: 60 + Math.random()*40,
        passing: 60 + Math.random()*40,
        defense: 60 + Math.random()*40,
        youth
    };
}

function generateRoster() {
    const pos = ["LW","C","RW","LD","RD","LW","C","RW","LD","RD"];
    return pos.map(p => createPlayer(p,false));
}

function generateYouth() {
    const pos = ["LW","C","RW","LD","RD"];
    return pos.map(p => createPlayer(p,true));
}

// ------------------ UI ------------------
function showView(id) {
    document.querySelectorAll(".view").forEach(v => v.classList.remove("activeView"));
    document.getElementById(id).classList.add("activeView");
}

function loadTeams() {
    const list = document.getElementById("teamSelectList");
    teams.forEach(t => {
        const btn = document.createElement("button");
        btn.className = "teamButton";
        btn.style.background = t.color;
        btn.textContent = t.name;
        btn.onclick = () => {
            selectedTeam = t;
            selectedRoster = generateRoster();
            youthPlayers = generateYouth();
            renderRoster();
            renderYouth();
            showView("viewRoster");
        };
        list.appendChild(btn);
    });
}

function renderRoster() {
    const div = document.getElementById("rosterList");
    div.innerHTML = "";
    document.getElementById("rosterTeamName").textContent = selectedTeam.name;

    selectedRoster.forEach(p => {
        const row = document.createElement("div");
        row.className = "playerRow";
        row.textContent = `${p.position} - ${p.name}`;
        div.appendChild(row);
    });
}

function renderYouth() {
    const div = document.getElementById("youthList");
    div.innerHTML = "";

    youthPlayers.forEach((p,i) => {
        const row = document.createElement("div");
        row.className = "playerRow";
        row.innerHTML = `${p.position} - ${p.name}
            <button class="promoteBtn">Promote</button>`;
        row.querySelector("button").onclick = () => {
            selectedRoster.push(p);
            youthPlayers.splice(i,1);
            renderRoster();
            renderYouth();
        };
        div.appendChild(row);
    });
}

// ------------------ GAME ENGINE ------------------
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

// Auto‑resize canvas to fit screen
function resizeCanvas() {
    canvas.width = canvas.clientWidth;
    canvas.height = canvas.clientHeight;
}
window.onresize = resizeCanvas;

// Game variables
let userPlayers = [];
let cpuPlayers = [];
let puck = {x:0,y:0,vx:0,vy:0};
let scoreUser = 0;
let scoreCPU = 0;
let period = 1;
let timeLeft = 60;
let lastTime = 0;
let keys = {};

document.addEventListener("keydown", e => keys[e.key] = true);
document.addEventListener("keyup", e => keys[e.key] = false);

function startSeason() {
    scoreUser = 0;
    scoreCPU = 0;
    period = 1;
    timeLeft = 60;

    setupTeams();
    resizeCanvas();
    showView("viewGame");
    requestAnimationFrame(gameLoop);
}

function setupTeams() {
    userPlayers = [];
    cpuPlayers = [];

    const c = selectedTeam.color;
    const yPos = [100,180,260,140,220];

    for (let i=0;i<5;i++) {
        userPlayers.push({x:150,y:yPos[i],vx:0,vy:0,color:c});
        cpuPlayers.push({x:canvas.width-150,y:yPos[i],vx:0,vy:0,color:"#2222aa"});
    }

    puck.x = canvas.width/2;
    puck.y = canvas.height/2;
}

function drawRink() {
    ctx.fillStyle = "#e8f4ff";
    ctx.fillRect(0,0,canvas.width,canvas.height);

    ctx.strokeStyle = "#1a3a6e";
    ctx.lineWidth = 4;

    ctx.beginPath();
    ctx.moveTo(canvas.width/2,0);
    ctx.lineTo(canvas.width/2,canvas.height);
    ctx.stroke();

    ctx.beginPath();
    ctx.arc(canvas.width/2,canvas.height/2,60,0,Math.PI*2);
    ctx.stroke();
}

function drawPlayer(p) {
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x,p.y,12,0,Math.PI*2);
    ctx.fill();
}

function drawPuck() {
    ctx.fillStyle = "black";
    ctx.beginPath();
    ctx.arc(puck.x,puck.y,6,0,Math.PI*2);
    ctx.fill();
}

function updateUser(dt) {
    const p = userPlayers[1];
    const speed = 200;

    p.vx = (keys["ArrowRight"] ? speed : 0) - (keys["ArrowLeft"] ? speed : 0);
    p.vy = (keys["ArrowDown"] ? speed : 0) - (keys["ArrowUp"] ? speed : 0);

    p.x += p.vx * dt;
    p.y += p.vy * dt;
}

function updateAI(dt) {
    cpuPlayers.forEach(p => {
        const dx = puck.x - p.x;
        const dy = puck.y - p.y;
        const dist = Math.hypot(dx,dy) || 1;
        p.x += (dx/dist)*120*dt;
        p.y += (dy/dist)*120*dt;
    });
}

function updatePuck(dt) {
    puck.x += puck.vx * dt;
    puck.y += puck.vy * dt;

    puck.vx *= 0.99;
    puck.vy *= 0.99;

    function collide(team, power) {
        team.forEach(p => {
            const dx = puck.x - p.x;
            const dy = puck.y - p.y;
            const dist = Math.hypot(dx,dy);
            if (dist < 18) {
                puck.vx = (dx/dist)*power;
                puck.vy = (dy/dist)*power;
            }
        });
    }

    collide(userPlayers,260);
    collide(cpuPlayers,220);

    if (puck.x < 20) { scoreCPU++; resetPuck(); }
    if (puck.x > canvas.width-20) { scoreUser++; resetPuck(); }
}

function resetPuck() {
    puck.x = canvas.width/2;
    puck.y = canvas.height/2;
    puck.vx = 0;
    puck.vy = 0;
}

function updateTime(dt) {
    timeLeft -= dt;
    if (timeLeft <= 0) {
        period++;
        if (period > 3) {
            endGame();
        } else {
            timeLeft = 60;
            resetPuck();
        }
    }
}

function endGame() {
    if (scoreUser > scoreCPU) seasonWins++;
    else if (scoreUser < scoreCPU) seasonLosses++;
    else seasonTies++;

    document.getElementById("seasonStats").textContent =
        `Season: W ${seasonWins} - L ${seasonLosses} - T ${seasonTies}`;

    alert(`Final Score:\n${selectedTeam.name} ${scoreUser} - ${scoreCPU} Hawks`);
}

function gameLoop(ts) {
    const dt = (ts - lastTime)/1000;
    lastTime = ts;

    drawRink();
    updateUser(dt);
    updateAI(dt);
    updatePuck(dt);
    updateTime(dt);

    userPlayers.forEach(drawPlayer);
    cpuPlayers.forEach(drawPlayer);
    drawPuck();

    document.getElementById("scoreboard").textContent =
        `${selectedTeam.name} ${scoreUser} - ${scoreCPU} Hawks`;

    document.getElementById("periodInfo").textContent =
        `Period ${period} | Time ${Math.ceil(timeLeft)}s`;

    requestAnimationFrame(gameLoop);
}

loadTeams();
</script>
</body>
</html>
