<!DOCTYPE html>
<html>
<head>
  <title>Penalty Kick Game</title>
  <style>
    * { box-sizing:border-box; margin:0; padding:0; }
    body {
      background:#0b6623;
      font-family:system-ui, sans-serif;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      height:100vh;
      color:white;
      overflow:hidden;
    }
    canvas {
      background:#87ceeb;
      border:3px solid white;
      border-radius:6px;
      box-shadow:0 0 15px rgba(0,0,0,0.4);
    }
    #menu button {
      padding:12px 25px;
      margin:10px;
      font-size:20px;
      cursor:pointer;
      border:none;
      border-radius:6px;
    }
  </style>
</head>
<body>

<!-- MODE SELECT MENU -->
<div id="menu" style="
  position:absolute; top:0; left:0; width:100%; height:100%;
  background:#0b6623; display:flex; flex-direction:column;
  justify-content:center; align-items:center; color:white;">
  <h1 style="font-size:40px; margin-bottom:20px;">Penalty Kick</h1>
  <p style="margin-bottom:20px;">Choose your role</p>

  <button onclick="startGame('striker')">Play as Striker</button>
  <button onclick="startGame('goalkeeper')">Play as Goalkeeper</button>
</div>

<h2 id="hud" style="margin-bottom:8px; display:none;">
  Score: <span id="score">0</span> |
  Shots: <span id="shots">0</span>
</h2>

<canvas id="game" width="500" height="320"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");
const scoreEl = document.getElementById("score");
const shotsEl = document.getElementById("shots");
const hud = document.getElementById("hud");

let mode = "striker"; // striker or goalkeeper

function startGame(selectedMode) {
  mode = selectedMode;
  document.getElementById("menu").style.display = "none";
  hud.style.display = "block";
  resetBall();
}

const groundY = 280;
const ballStart = { x:250, y:260 };
let score = 0;
let shots = 0;
let difficulty = 1;

let ball = {
  x: ballStart.x,
  y: ballStart.y,
  r: 10,
  vx: 0,
  vy: 0,
  moving: false
};

let goalie = {
  x: 200,
  y: 70,
  w: 100,
  h: 20,
  speed: 3,
  diveSpeed: 5,
  targetX: 200
};

let dragging = false;
let dragStart = null;
let dragEnd = null;
let message = "";
let messageTimer = 0;

let keys = {};
window.addEventListener("keydown", e => keys[e.key] = true);
window.addEventListener("keyup", e => keys[e.key] = false);

function getMousePos(evt) {
  const rect = canvas.getBoundingClientRect();
  return {
    x: (evt.clientX - rect.left) * (canvas.width / rect.width),
    y: (evt.clientY - rect.top) * (canvas.height / rect.height)
  };
}

canvas.addEventListener("mousedown", e => {
  if (mode !== "striker") return;
  if (ball.moving) return;

  const pos = getMousePos(e);
  const dx = pos.x - ball.x;
  const dy = pos.y - ball.y;

  if (Math.sqrt(dx*dx + dy*dy) <= ball.r + 10) {
    dragging = true;
    dragStart = { x: pos.x, y: pos.y };
    dragEnd = { x: pos.x, y: pos.y };
  }
});

canvas.addEventListener("mousemove", e => {
  if (!dragging) return;
  dragEnd = getMousePos(e);
});

canvas.addEventListener("mouseup", e => {
  if (!dragging) return;
  dragging = false;

  const dx = dragStart.x - dragEnd.x;
  const dy = dragStart.y - dragEnd.y;
  const power = Math.min(Math.sqrt(dx*dx + dy*dy), 160);

  if (power < 10) return;

  const factor = 0.12 + difficulty * 0.01;
  ball.vx = dx * factor;
  ball.vy = dy * factor;
  ball.moving = true;

  shots++;
  shotsEl.textContent = shots;

  const predictedX = ball.x + ball.vx * 12;
  goalie.targetX = predictedX - goalie.w / 2;

  if (Math.random() < 0.3 + difficulty * 0.02) {
    goalie.targetX += (Math.random() - 0.5) * 120;
  }
});

function resetBall() {
  ball.x = ballStart.x;
  ball.y = ballStart.y;
  ball.vx = 0;
  ball.vy = 0;
  ball.moving = false;

  difficulty += 0.2;
  goalie.speed = 3 + difficulty;
  goalie.diveSpeed = 5 + difficulty * 0.5;
}

function showMessage(text) {
  message = text;
  messageTimer = 90;
}

function updateGoalie() {
  if (mode === "striker") {
    const center = goalie.x + goalie.w / 2;
    if (center < goalie.targetX) goalie.x += goalie.diveSpeed;
    else if (center > goalie.targetX) goalie.x -= goalie.diveSpeed;
  }

  if (mode === "goalkeeper") {
    if (keys["ArrowLeft"]) goalie.x -= goalie.diveSpeed * 1.4;
    if (keys["ArrowRight"]) goalie.x += goalie.diveSpeed * 1.4;
  }

  goalie.x = Math.max(120, Math.min(380 - goalie.w, goalie.x));
}

function updateBall() {
  if (!ball.moving) return;

  ball.x += ball.vx;
  ball.y += ball.vy;
  ball.vy += 0.25;

  if (ball.y + ball.r > groundY) {
    ball.y = groundY - ball.r;
    ball.vy *= -0.4;
    ball.vx *= 0.7;

    if (Math.abs(ball.vy) < 0.8) {
      ball.moving = false;
      showMessage("Miss");
      setTimeout(resetBall, 700);
    }
  }

  if (ball.x < -50 || ball.x > canvas.width + 50 || ball.y > canvas.height + 50) {
    ball.moving = false;
    showMessage("Miss");
    setTimeout(resetBall, 700);
  }

  const goalTop = 40;
  const goalLeft = 150;
  const goalRight = 350;

  if (ball.y - ball.r <= goalTop && ball.x > goalLeft && ball.x < goalRight) {
    if (
      ball.x + ball.r > goalie.x &&
      ball.x - ball.r < goalie.x + goalie.w &&
      ball.y - ball.r < goalie.y + goalie.h &&
      ball.y + ball.r > goalie.y
    ) {
      showMessage("Saved");
      ball.vy = Math.abs(ball.vy) * 0.6;
      ball.vx *= -0.5;
    } else {
      score++;
      scoreEl.textContent = score;
      showMessage("GOAL");
      ball.moving = false;
      setTimeout(resetBall, 700);
    }
  }
}

function aiStriker() {
  if (mode === "goalkeeper" && !ball.moving) {
    if (Math.random() < 0.02) {
      ball.vx = (Math.random() - 0.5) * (4 + difficulty);
      ball.vy = -(5 + Math.random() * 4 + difficulty);
      ball.moving = true;

      goalie.targetX = ball.x + ball.vx * 12;
    }
  }
}

function update() {
  updateGoalie();
  updateBall();
  aiStriker();

  if (messageTimer > 0) {
    messageTimer--;
    if (messageTimer === 0) message = "";
  }
}

function drawPitch() {
  ctx.fillStyle = "#0b6623";
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  ctx.strokeStyle = "white";
  ctx.lineWidth = 2;
  ctx.strokeRect(120, 40, 260, 240);
  ctx.strokeRect(150, 20, 200, 40);

  ctx.beginPath();
  ctx.arc(ballStart.x, ballStart.y, 3, 0, Math.PI*2);
  ctx.fillStyle = "white";
  ctx.fill();
}

function drawGoalie() {
  ctx.fillStyle = "#ffeb3b";
  ctx.fillRect(goalie.x, goalie.y, goalie.w, goalie.h);
}

function drawBall() {
  ctx.beginPath();
  ctx.arc(ball.x, ball.y, ball.r, 0, Math.PI*2);
  ctx.fillStyle = "white";
  ctx.fill();
  ctx.strokeStyle = "#ccc";
  ctx.stroke();
}

function drawMessage() {
  if (!message) return;
  ctx.fillStyle = "rgba(0,0,0,0.6)";
  ctx.fillRect(0, 120, canvas.width, 60);
  ctx.fillStyle = "white";
  ctx.font = "24px system-ui";
  ctx.textAlign = "center";
  ctx.fillText(message, canvas.width / 2, 158);
  ctx.textAlign = "left";
}

function loop() {
  update();
  drawPitch();
  drawGoalie();
  drawBall();
  drawMessage();
  requestAnimationFrame(loop);
}

resetBall();
loop();
</script>

</body>
</html>
