<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Drew Sossomon GK Challenge</title>

<style>
  body {
    margin: 0;
    background: #0b1724;
    color: #fff;
    font-family: Arial, sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  h1 {
    margin-top: 10px;
    font-size: 22px;
    text-align: center;
  }

  #info {
    margin: 5px 0 10px;
    font-size: 14px;
    text-align: center;
    max-width: 600px;
  }

  #hud {
    margin: 10px 0;
    font-size: 14px;
    text-align: center;
  }

  #hud span {
    margin: 0 8px;
  }

  canvas {
    background: #1c3b2f;
    border: 3px solid #ffffff;
    border-radius: 6px;
    display: block;
  }

  #startBtn {
    margin-top: 8px;
    padding: 6px 14px;
    border-radius: 4px;
    border: none;
    background: #f5c542;
    color: #000;
    font-weight: bold;
    cursor: pointer;
  }

  #message {
    margin-top: 8px;
    min-height: 20px;
    font-size: 14px;
    text-align: center;
  }
</style>
</head>

<body>

<h1>Drew Sossomon GK Challenge</h1>

<div id="info">
  Move the goalkeeper and try to save as many shots as you can.<br>
  Only shots on target count toward shots on goal.
</div>

<div id="hud">
  <span>Shots: <span id="shotsThisGame">0</span></span>
  <span>On target: <span id="onTargetThisGame">0</span></span>
  <span>Saves: <span id="savesThisGame">0</span></span>
  <span>Goals against: <span id="goalsAgainst">0</span></span>
</div>

<canvas id="game" width="500" height="400"></canvas>

<button id="startBtn">Start / Restart Game</button>
<div id="message"></div>

<script>
// ====== CANVAS ======
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

// ====== HUD ======
const shotsThisGameEl = document.getElementById("shotsThisGame");
const onTargetThisGameEl = document.getElementById("onTargetThisGame");
const savesThisGameEl = document.getElementById("savesThisGame");
const goalsAgainstEl = document.getElementById("goalsAgainst");
const messageEl = document.getElementById("message");

// ====== FIELD GEOMETRY ======
const fieldMargin = 20;
const fieldX = fieldMargin;
const fieldY = fieldMargin;
const fieldWidth = canvas.width - fieldMargin * 2;
const fieldHeight = canvas.height - fieldMargin * 2;

// Goal line at bottom
const goalLineY = fieldY + fieldHeight;

// Goal (same size as before)
const goalWidth = 300;
const goalHeight = 16;
const goalX = fieldX + (fieldWidth - goalWidth) / 2;
const goalY = goalLineY - goalHeight;

// 18-yard box (ONLY ONE BOX)
const boxWidth = 440;
const boxDepth = 140;
const boxX = fieldX + (fieldWidth - boxWidth) / 2;
const boxY = goalLineY - boxDepth;

// Penalty spot (NO ARC)
const pkSpotX = canvas.width / 2;
const pkSpotY = goalLineY - 90;

// ====== GOALIE ======
const goalie = {
  x: pkSpotX - 35,
  y: goalY - 10,
  width: 70,
  height: 10,
  speed: 7
};

// ====== BALL ======
let ball = null;
const shotMinSpeed = 4;
const shotMaxSpeed = 7;

// ====== GAME STATE ======
let running = false;
let shotsThisGame = 0;
let onTargetThisGame = 0;
let savesThisGame = 0;
let goalsAgainst = 0;

let keys = {};

// ====== INPUT ======
document.addEventListener("keydown", e => keys[e.key] = true);
document.addEventListener("keyup", e => keys[e.key] = false);

canvas.addEventListener("mousemove", e => {
  const rect = canvas.getBoundingClientRect();
  goalie.x = e.clientX - rect.left - goalie.width / 2;
  clampGoalie();
});

// ====== BUTTON ======
document.getElementById("startBtn").addEventListener("click", () => {
  resetGame();
  startGame();
});

// ====== RESET ======
function resetGame() {
  shotsThisGame = 0;
  onTargetThisGame = 0;
  savesThisGame = 0;
  goalsAgainst = 0;
  updateHUD();
  messageEl.textContent = "";
  ball = null;
}

// ====== START ======
function startGame() {
  running = true;
  spawnShot();
  requestAnimationFrame(gameLoop);
}

// ====== SHOTS ======
function spawnShot() {
  const startX = Math.random() * canvas.width;
  const startY = fieldY;

  const isOnTarget = Math.random() < 0.7;

  let targetX;
  if (isOnTarget) {
    targetX = goalX + 20 + Math.random() * (goalWidth - 40);
  } else {
    targetX = Math.random() < 0.5
      ? goalX - 80 - Math.random() * 80
      : goalX + goalWidth + 80 + Math.random() * 80;
  }

  const targetY = goalLineY - goalHeight / 2;

  const dx = targetX - startX;
  const dy = targetY - startY;
  const dist = Math.sqrt(dx * dx + dy * dy);

  const speed = shotMinSpeed + Math.random() * (shotMaxSpeed - shotMinSpeed);
  const vx = (dx / dist) * speed;
  const vy = (dy / dist) * speed;

  ball = { x: startX, y: startY, radius: 7, vx, vy, isOnTarget };

  shotsThisGame++;
  if (isOnTarget) onTargetThisGame++;
  updateHUD();
}

// ====== HUD ======
function updateHUD() {
  shotsThisGameEl.textContent = shotsThisGame;
  onTargetThisGameEl.textContent = onTargetThisGame;
  savesThisGameEl.textContent = savesThisGame;
  goalsAgainstEl.textContent = goalsAgainst;
}

// ====== LIMIT GOALIE ======
function clampGoalie() {
  if (goalie.x < boxX) goalie.x = boxX;
  if (goalie.x + goalie.width > boxX + boxWidth)
    goalie.x = boxX + boxWidth - goalie.width;
}

// ====== UPDATE ======
function update() {
  if (keys["ArrowLeft"] || keys["a"]) goalie.x -= goalie.speed;
  if (keys["ArrowRight"] || keys["d"]) goalie.x += goalie.speed;
  clampGoalie();

  if (ball) {
    ball.x += ball.vx;
    ball.y += ball.vy;

    if (ball.y + ball.radius >= goalLineY) {
      const withinPosts =
        ball.x >= goalX &&
        ball.x <= goalX + goalWidth;

      const hitGoalie =
        ball.x + ball.radius >= goalie.x &&
        ball.x - ball.radius <= goalie.x + goalie.width &&
        ball.y + ball.radius >= goalie.y &&
        ball.y - ball.radius <= goalie.y + goalie.height;

      if (hitGoalie && ball.isOnTarget) {
        savesThisGame++;
        updateHUD();
        spawnShot();
      } else if (withinPosts && ball.isOnTarget) {
        goalsAgainst++;
        updateHUD();
        spawnShot();
      } else {
        spawnShot();
      }
    }
  }
}

// ====== DRAW FIELD ======
function drawField() {
  ctx.strokeStyle = "#ffffff";
  ctx.lineWidth = 2;

  // Outer field
  ctx.strokeRect(fieldX, fieldY, fieldWidth, fieldHeight);

  // Halfway line
  ctx.beginPath();
  ctx.moveTo(fieldX, fieldY + fieldHeight / 2);
  ctx.lineTo(fieldX + fieldWidth, fieldY + fieldHeight / 2);
  ctx.stroke();

  // Center circle
  ctx.beginPath();
  ctx.arc(
    fieldX + fieldWidth / 2,
    fieldY + fieldHeight / 2,
    40,
    0,
    Math.PI * 2
  );
  ctx.stroke();

  // Center spot
  ctx.beginPath();
  ctx.arc(fieldX + fieldWidth / 2, fieldY + fieldHeight / 2, 3, 0, Math.PI * 2);
  ctx.fill();

  // 18-yard box (ONLY ONE)
  ctx.strokeRect(boxX, boxY, boxWidth, boxDepth);

  // Goal
  ctx.strokeRect(goalX, goalY, goalWidth, goalHeight);

  // Penalty spot (NO ARC)
  ctx.beginPath();
  ctx.arc(pkSpotX, pkSpotY, 3, 0, Math.PI * 2);
  ctx.fill();
}

// ====== DRAW GOALIE ======
function drawGoalie() {
  ctx.fillStyle = "#f5c542";
  ctx.fillRect(goalie.x, goalie.y, goalie.width, goalie.height);
}

// ====== DRAW BALL ======
function drawBall() {
  if (!ball) return;
  ctx.beginPath();
  ctx.arc(ball.x, ball.y, ball.radius, 0, Math.PI * 2);
  ctx.fillStyle = "#ffffff";
  ctx.fill();
  ctx.strokeStyle = "#000000";
  ctx.stroke();
}

// ====== GAME LOOP ======
function gameLoop() {
  if (!running) return;

  ctx.clearRect(0, 0, canvas.width, canvas.height);

  drawField();
  drawGoalie();
  drawBall();

  update();
  requestAnimationFrame(gameLoop);
}

resetGame();
</script>

</body>
</html>
