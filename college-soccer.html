// -----------------------------------------------------

let match = {

// -----------------------------------------------------
//  UTILS
// -----------------------------------------------------
function clamp(v, min, max) {
  return Math.max(min, Math.min(max, v));
}
function randRange(a,b) {
  return a + Math.random()*(b-a);
}

// -----------------------------------------------------
//  NEW SEASON
// -----------------------------------------------------
function newSeason() {
  playerTeam.wins = 0;
  playerTeam.losses = 0;
  playerTeam.goalsFor = 0;
  playerTeam.goalsAgainst = 0;
  scheduleIndex = 0;
  currentOpponent = opponents[scheduleIndex];
}

// -----------------------------------------------------
//  MATCH SETUP
// -----------------------------------------------------
function setupMatch() {
  match.time = 0;
  match.homeScore = 0;
  match.awayScore = 0;
  match.finished = false;
  matchPaused = false;

  players = [];
  opponentsOnField = [];

  for (let i = 0; i < 7; i++) {
    players.push({
      x: 80 + i*40,
      y: 140 + i*40,
      vx: 0,
      vy: 0,
      speed: 2.0,
      hasBall: i === 0
    });
  }
  for (let i = 0; i < 7; i++) {
    opponentsOnField.push({
      x: W - 120 - i*40,
      y: 140 + i*40,
      vx: 0,
      vy: 0,
      speed: 1.8
    });
  }

  controlledIndex = 0;
  ball.holder = players[0];
  ball.x = ball.holder.x + 10;
  ball.y = ball.holder.y;
  ball.vx = 0;
  ball.vy = 0;
}

// -----------------------------------------------------
//  MATCH INPUT (PLAYER CONTROL)
// -----------------------------------------------------
function updateMatchInput() {
  const p = players[controlledIndex];
  p.vx = 0;
  p.vy = 0;

  let speed = p.speed;
  if (currentDifficulty() === "Easy") speed *= 1.1;
  if (currentDifficulty() === "Hard") speed *= 0.9;

  if (keys["ArrowUp"] || keys["w"] || keys["W"]) p.vy = -speed;
  if (keys["ArrowDown"] || keys["s"] || keys["S"]) p.vy = speed;
  if (keys["ArrowLeft"] || keys["a"] || keys["A"]) p.vx = -speed;
  if (keys["ArrowRight"] || keys["d"] || keys["D"]) p.vx = speed;

  if (keys["c"] || keys["C"]) {
    passBall();
    keys["c"] = keys["C"] = false;
  }

  if (keys["x"] || keys["X"]) {
    shootBall();
    keys["x"] = keys["X"] = false;
  }

  if (keys["q"] || keys["Q"]) {
    switchPlayer();
    keys["q"] = keys["Q"] = false;
  }

  if (keys["p"] || keys["P"]) {
    matchPaused = !matchPaused;
    keys["p"] = keys["P"] = false;
  }
}

// -----------------------------------------------------
//  SWITCH CONTROLLED PLAYER
// -----------------------------------------------------
function switchPlayer() {
  let bestIndex = controlledIndex;
  let bestDist = Infinity;
  for (let i = 0; i < players.length; i++) {
    const p = players[i];
    const d = Math.hypot(p.x - ball.x, p.y - ball.y);
    if (d < bestDist) {
      bestDist = d;
      bestIndex = i;
    }
  }
  controlledIndex = bestIndex;
}

// -----------------------------------------------------
//  PASS / SHOOT
// -----------------------------------------------------
function passBall() {
  const holder = ball.holder;
  if (!holder) return;

  let best = null;
  let bestScore = -Infinity;
  for (let i = 0; i < players.length; i++) {
    const p = players[i];
    if (p === holder) continue;
    const dx = p.x - holder.x;
    const dy = p.y - holder.y;
    if (dx <= -20) continue;
    const dist = Math.hypot(dx, dy);
    if (dist > 260) continue;
    const score = dx - Math.abs(dy)*0.5;
    if (score > bestScore) {
      bestScore = score;
      best = p;
    }
  }

  if (best) {
    const dx = best.x - holder.x;
    const dy = best.y - holder.y;
    const len = Math.hypot(dx, dy) || 1;
    const speed = 4.0;
    ball.holder = null;
    ball.vx = (dx/len)*speed;
    ball.vy = (dy/len)*speed;
  }
}

function shootBall() {
  const holder = ball.holder;
  if (!holder) return;
  if (holder.x < W - 220) return;

  const goalY = H/2 + randRange(-40,40);
  const dx = (W - 40) - holder.x;
  const dy = goalY - holder.y;
  const len = Math.hypot(dx, dy) || 1;
  const speed = 5.0;
  ball.holder = null;
  ball.vx = (dx/len)*speed;
  ball.vy = (dy/len)*speed;
}

// -----------------------------------------------------
//  OPPONENT AI
// -----------------------------------------------------
function updateOpponentAI() {
  const target = ball.holder || ball;
  opponentsOnField.forEach(d => {
    const dx = target.x - d.x;
    const dy = target.y - d.y;
    const dist = Math.hypot(dx, dy) || 1;
    let speed = d.speed;
    if (currentDifficulty() === "Easy") speed *= 0.9;
    if (currentDifficulty() === "Hard") speed *= 1.1;
    d.vx = (dx/dist)*speed*0.7;
    d.vy = (dy/dist)*speed*0.7;
  });
}

// -----------------------------------------------------
//  WEATHER EFFECTS
// -----------------------------------------------------
function applyWeather() {
  if (currentWeather() === "Rain") {
    ball.vx *= 0.98;
    ball.vy *= 0.98;
  } else if (currentWeather() === "Snow") {
    ball.vx *= 0.96;
    ball.vy *= 0.96;
  } else if (currentWeather() === "Windy") {
    ball.vx += (Math.random()-0.5)*0.08;
    ball.vy += (Math.random()-0.5)*0.08;
  }
}

// -----------------------------------------------------
//  MATCH UPDATE
// -----------------------------------------------------
function updateMatch() {
  if (match.finished) {
    if (keys["Enter"]) {
      endMatchToSeason();
      keys["Enter"] = false;
    }
    return;
  }

  if (matchPaused) return;

  match.time++;

  updateMatchInput();
  updateOpponentAI();

  players.forEach(p => {
    p.x += p.vx;
    p.y += p.vy;
    p.x = clamp(p.x, 40, W-40);
    p.y = clamp(p.y, 80, H-40);
  });

  opponentsOnField.forEach(d => {
    d.x += d.vx;
    d.y += d.vy;
    d.x = clamp(d.x, 80, W-20);
    d.y = clamp(d.y, 80, H-40);
  });

  if (ball.holder) {
    ball.x = ball.holder.x + 8;
    ball.y = ball.holder.y;
  } else {
    ball.x += ball.vx;
    ball.y += ball.vy;
    ball.vx *= 0.99;
    ball.vy *= 0.99;
    applyWeather();
  }

  if (ball.holder) {
    opponentsOnField.forEach(d => {
      const dist = Math.hypot(d.x - ball.holder.x, d.y - ball.holder.y);
      if (dist < 18) {
        ball.holder = null;
        ball.vx = -3;
        ball.vy = 0;
      }
    });
  } else {
    players.forEach(p => {
      const dist = Math.hypot(p.x - ball.x, p.y - ball.y);
      if (dist < 10) {
        ball.holder = p;
        ball.vx = ball.vy = 0;
      }
    });
    opponentsOnField.forEach(d => {
      const dist = Math.hypot(d.x - ball.x, d.y - ball.y);
      if (dist < 10) {
        match.finished = true;
        match.awayScore++;
      }
    });
  }

  if (!ball.holder && ball.x > W-40 && ball.y > H/2-40 && ball.y < H/2+40) {
    match.finished = true;
    match.homeScore++;
  }

  if (ball.y < 60 || ball.y > H-20) {
    match.finished = true;
    match.awayScore++;
  }

  if (match.time >= match.duration) {
    match.finished = true;
  }
}

// -----------------------------------------------------
//  MATCH -> SEASON RESULT
// -----------------------------------------------------
function endMatchToSeason() {
  playerTeam.goalsFor += match.homeScore;
  playerTeam.goalsAgainst += match.awayScore;
  if (match.homeScore > match.awayScore) playerTeam.wins++;
  else if (match.homeScore < match.awayScore) playerTeam.losses++;

  scheduleIndex++;
  if (scheduleIndex >= opponents.length) {
    state = "seasonOver";
  } else {
    currentOpponent = opponents[scheduleIndex];
    state = "season";
  }
}

// -----------------------------------------------------
//  YOUTH GROWTH (END OF SEASON)
// -----------------------------------------------------
function growYouth() {
  youthPlayers.forEach(p => {
    const growth = 2 + Math.floor(Math.random()*4);
    p.ovr = Math.min(p.pot, p.ovr + growth);
    p.age++;
  });
}

// -----------------------------------------------------
//  GLOBAL BACK (B)
// -----------------------------------------------------
function handleBack() {
  if (keys["b"] || keys["B"]) {
    if (state === "roster" || state === "recruit" || state === "youth" || state === "settings" || state === "confTournamentSelect" || state === "confTournament" || state === "natTournament") {
      state = "season";
    } else if (state === "season" || state === "seasonOver") {
      state = "mainMenu";
    }
    keys["b"] = keys["B"] = false;
  }
}

// -----------------------------------------------------
//  TOURNAMENT HELPERS
// -----------------------------------------------------
function simulateMatch(teamA, teamB) {
  const scoreA = Math.floor(Math.random() * 4);
  const scoreB = Math.floor(Math.random() * 4);
  if (scoreA === scoreB) {
    return Math.random() < 0.5 ? teamA : teamB;
  }
  return scoreA > scoreB ? teamA : teamB;
}

function generateConferenceTournament(confName) {
  const teams = conferences[confName] || [];
  const seeded = teams.slice(0, Math.min(8, teams.length));
  return {
    conference: confName,
    teams: seeded,
    champion: null
  };
}

function playConferenceTournament(t) {
  let teams = t.teams.slice();
  if (teams.length < 2) return teams[0] || null;

  // Quarterfinals
  let semi = [];
  for (let i = 0; i < teams.length/2; i++) {
    semi.push(simulateMatch(teams[i], teams[teams.length-1-i]));
  }

  // Semifinals
  let finals = [];
  finals.push(simulateMatch(semi[0], semi[semi.length-1]));
  if (semi.length > 2) {
    finals.push(simulateMatch(semi[1], semi[semi.length-2]));
  } else if (semi.length === 2) {
    finals.push(semi[1]);
  }

  // Final
  let champion = simulateMatch(finals[0], finals[1] || finals[0]);
  return champion;
}

function getNationalQualifiers() {
  let qualifiers = [];
  for (let conf in conferences) {
    qualifiers.push(...conferences[conf].slice(0, 25));
  }
  return qualifiers;
}

function playNationalChampionship() {
  let teams = getNationalQualifiers();
  nationalBracketLog = [];
  while (teams.length > 1) {
    let next = [];
    for (let i = 0; i < teams.length; i += 2) {
      if (i+1 >= teams.length) {
        next.push(teams[i]);
      } else {
        const winner = simulateMatch(teams[i], teams[i+1]);
        nationalBracketLog.push(`${teams[i]} vs ${teams[i+1]} -> ${winner}`);
        next.push(winner);
      }
    }
    teams = next;
  }
  return teams[0] || null;
}

  }
  if (keys["Enter"]) {
    setupMatch();
    state = "match";
    keys["Enter"] = false;

function updateRoster() {
  if (keys["ArrowUp"]) {
    selectedRosterIndex = Math.max(0, selectedRosterIndex-1);
    keys["ArrowUp"] = false;
  }
  if (keys["ArrowDown"]) {
    selectedRosterIndex = Math.min(roster.length-1, selectedRosterIndex+1);
    keys["ArrowDown"] = false;
  }
}

function updateRecruit() {
  if (keys["ArrowUp"]) {
    selectedRecruitIndex = Math.max(0, selectedRecruitIndex-1);
    keys["ArrowUp"] = false;
  }
  if (keys["ArrowDown"]) {
    selectedRecruitIndex = Math.min(recruits.length-1, selectedRecruitIndex+1);
    keys["ArrowDown"] = false;
  }
  if (keys["Enter"]) {
    recruits[selectedRecruitIndex].interest = Math.min(100, recruits[selectedRecruitIndex].interest + 10);
    keys["Enter"] = false;
  }
}

function updateYouth() {
  if (keys["ArrowUp"]) {
    selectedYouthIndex = Math.max(0, selectedYouthIndex-1);
    keys["ArrowUp"] = false;
  }
  if (keys["ArrowDown"]) {
    selectedYouthIndex = Math.min(youthPlayers.length-1, selectedYouthIndex+1);
    keys["ArrowDown"] = false;
  }
  if (keys["Enter"]) {
    const y = youthPlayers[selectedYouthIndex];
    roster.push({ name: y.name, pos: y.pos, ovr: y.ovr, year: "FR" });
    youthPlayers.splice(selectedYouthIndex,1);
    selectedYouthIndex = Math.max(0, selectedYouthIndex-1);
    keys["Enter"] = false;
  }
}

function updateSettings() {
  if (keys["ArrowLeft"]) {
    settings.difficultyIndex = (settings.difficultyIndex - 1 + difficulties.length) % difficulties.length;
    keys["ArrowLeft"] = false;
  }
  if (keys["ArrowRight"]) {
    settings.difficultyIndex = (settings.difficultyIndex + 1) % difficulties.length;
    keys["ArrowRight"] = false;
  }
  if (keys["ArrowUp"]) {
    settings.weatherIndex = (settings.weatherIndex - 1 + weathers.length) % weathers.length;
    keys["ArrowUp"] = false;
  }
  if (keys["ArrowDown"]) {
    settings.weatherIndex = (settings.weatherIndex + 1) % weathers.length;
    keys["ArrowDown"] = false;
  }
}

function updateSeasonOver() {
  if (keys["Enter"]) {
    growYouth();
    newSeason();
    state = "season";
    keys["Enter"] = false;
  }
}

//  TOURNAMENT STATE UPDATES
// -----------------------------------------------------
let conferenceList = Object.keys(conferences);
let selectedConferenceIndex = 0;

function updateConfTournamentSelect() {
  if (keys["ArrowUp"]) {
    selectedConferenceIndex = (selectedConferenceIndex - 1 + conferenceList.length) % conferenceList.length;
    keys["ArrowUp"] = false;
  }
  if (keys["ArrowDown"]) {
    selectedConferenceIndex = (selectedConferenceIndex + 1) % conferenceList.length;
    keys["ArrowDown"] = false;
  }
  if (keys["Enter"]) {
    currentConferenceName = conferenceList[selectedConferenceIndex];
    currentConferenceTournament = generateConferenceTournament(currentConferenceName);
    conferenceChampion = playConferenceTournament(currentConferenceTournament);
    state = "confTournament";
    keys["Enter"] = false;
  }
}

function updateConfTournament() {
  if (keys["Enter"]) {
    nationalChampion = playNationalChampionship();
    state = "natTournament";
    keys["Enter"] = false;
  }
}

function updateNatTournament() {
  if (keys["Enter"]) {
    state = "season";
    keys["Enter"] = false;
  }
}

  ctx.strokeRect(x,y,w,h);
}

  ctx.fillStyle = color;
  ctx.font = size+"px monospace";
  ctx.fillText(text,x,y);
}

  drawText("Press Enter", 380, 280, 16, "#fff");
}

function drawMainMenu() {
  ctx.fillStyle = "#111";
  ctx.fillRect(0,0,W,H);
  drawText("MAIN MENU", 400, 120, 24);
  drawPanel(260, 180, 440, 60);
  drawText("1 - New Season", 320, 215, 18);
  drawPanel(260, 260, 440, 60);
  drawText("2 - Continue Season", 300, 295, 18);
  drawPanel(260, 340, 440, 60);
  drawText("3 - Tournaments (Conference + National)", 270, 375, 16);
}

function drawSeason() {
  ctx.fillStyle = "#111";
  ctx.fillRect(0,0,W,H);

  drawText(playerTeam.name, 20, 40, 18, "#0f0");
  drawText(`Conf: ${playerTeam.conf}`, 20, 65, 14);
  drawText(`Record: ${playerTeam.wins}-${playerTeam.losses}`, 20, 85, 14);
  drawText(`GF/GA: ${playerTeam.goalsFor}/${playerTeam.goalsAgainst}`, 20, 105, 14);

  drawPanel(20, 130, 420, 140);
  drawText("Next Match", 30, 155, 16);
  drawText(`vs ${currentOpponent.name}`, 30, 180, 14);
  drawText(`Their OVR: ${currentOpponent.rating}`, 30, 200, 14);
  drawText("Press Enter to Play", 30, 225, 14);

  drawPanel(460, 130, 480, 200);
  drawText("R - Roster", 470, 160, 14);
  drawText("Q - Recruiting", 470, 185, 14);
  drawText("Y - Youth Academy", 470, 210, 14);
  drawText("S - Settings", 470, 235, 14);
  drawText("T - Tournaments", 470, 260, 14);
  drawText("B - Back to Main Menu", 470, 285, 14);
}

function drawRoster() {
  ctx.fillStyle = "#111";
  ctx.fillRect(0,0,W,H);
  drawText("ROSTER", 430, 60, 22);
  let y = 110;
  roster.forEach((p,i)=>{
    const marker = i === selectedRosterIndex ? ">" : " ";
    drawText(`${marker} ${p.name} ${p.pos} OVR:${p.ovr} ${p.year}`, 40, y, 14);
    y += 22;
  });
  drawText("Up/Down = Select • B = Back", 40, H-40, 14);
}

function drawRecruit() {
  ctx.fillStyle = "#111";
  ctx.fillRect(0,0,W,H);
  drawText("RECRUITING", 410, 60, 22);
  let y = 110;
  recruits.forEach((r,i)=>{
    const marker = i === selectedRecruitIndex ? ">" : " ";
    drawText(`${marker} ${r.name} ${r.pos} OVR:${r.ovr} INT:${r.interest}%`, 40, y, 14);
    y += 22;
  });
  drawText("Up/Down = Select • Enter = Offer • B = Back", 40, H-40, 14);
}

function drawYouth() {
  ctx.fillStyle = "#111";
  ctx.fillRect(0,0,W,H);
  drawText("YOUTH ACADEMY", 380, 60, 22);
  let y = 110;
  youthPlayers.forEach((p,i)=>{
    const marker = i === selectedYouthIndex ? ">" : " ";
    drawText(`${marker} ${p.name} ${p.pos} Age:${p.age} OVR:${p.ovr} POT:${p.pot}`, 40, y, 14);
    y += 22;
  });
  drawText("Up/Down = Select • Enter = Promote • B = Back", 40, H-40, 14);
}

function drawSettings() {
  ctx.fillStyle = "#111";
  ctx.fillRect(0,0,W,H);
  drawText("SETTINGS", 420, 60, 22);
  drawText(`Difficulty: ${currentDifficulty()} (Left/Right)`, 80, 140, 16);
  drawText(`Weather:   ${currentWeather()} (Up/Down)`, 80, 170, 16);
  drawText("B = Back", 80, 210, 14);
}

function drawSeasonOver() {
  ctx.fillStyle = "#111";
  ctx.fillRect(0,0,W,H);
  drawText("SEASON OVER", 400, 120, 24);
  drawText(`Final Record: ${playerTeam.wins}-${playerTeam.losses}`, 320, 160, 18);
  drawText("Youth players have grown!", 340, 190, 18);
  drawText("Press Enter for new season", 340, 220, 16);
}

// -----------------------------------------------------
//  DRAW MATCH
// -----------------------------------------------------
function drawMatch() {
  ctx.fillStyle = "#0b4f1a";
  ctx.fillRect(0,0,W,H);

  ctx.strokeStyle = "#fff";
  ctx.strokeRect(40, 60, W-80, H-120);
  ctx.beginPath();
  ctx.moveTo(W/2, 60);
  ctx.lineTo(W/2, H-60);
  ctx.stroke();
  ctx.beginPath();
  ctx.arc(W/2, H/2, 60, 0, Math.PI*2);
  ctx.stroke();

  ctx.strokeRect(W-40, H/2-40, 20, 80);

  players.forEach((p,i)=>{
    ctx.fillStyle = i === controlledIndex ? "#ff0" : "#0ff";
    ctx.beginPath();
    ctx.arc(p.x, p.y, 10, 0, Math.PI*2);
    ctx.fill();
    ctx.strokeStyle = "#000";
    ctx.stroke();
  });

  opponentsOnField.forEach(d=>{
    ctx.fillStyle = "#f00";
    ctx.beginPath();
    ctx.arc(d.x, d.y, 10, 0, Math.PI*2);
    ctx.fill();
    ctx.strokeStyle = "#000";
    ctx.stroke();
  });

  ctx.fillStyle = "#fff";
  ctx.beginPath();
  ctx.arc(ball.x, ball.y, ball.radius, 0, Math.PI*2);
  ctx.fill();

  drawPanel(10, 10, W-20, 60, "#000000aa");
  drawText(playerTeam.name, 20, 30, 14);
  drawText(`vs ${currentOpponent.name}`, 20, 50, 14);
  drawText(`${match.homeScore} - ${match.awayScore}`, W-120, 30, 20);
  drawText(`Time: ${Math.floor(match.time/60)}'`, W-120, 50, 14);

  drawText("Move: Arrows/WASD  •  C: Pass  •  X: Shoot  •  Q: Switch  •  P: Pause", 80, H-20, 14);

  if (matchPaused) {
    drawPanel(W/2-150, H/2-60, 300, 120, "#000000dd");
    drawText("PAUSED", W/2-40, H/2-20, 20);
    drawText("P = Resume • B = Back to Season", W/2-130, H/2+10, 14);
  }

  if (match.finished) {
    drawPanel(W/2-150, H/2-60, 300, 120, "#000000dd");
    drawText("FULL TIME", W/2-60, H/2-20, 20);
    drawText(`Score: ${match.homeScore} - ${match.awayScore}`, W/2-90, H/2+5, 16);
    drawText("Press Enter to continue", W/2-110, H/2+30, 14);
  }
}

// -----------------------------------------------------
//  DRAW TOURNAMENT SCREENS
// -----------------------------------------------------
function drawConfTournamentSelect() {
  ctx.fillStyle = "#111";
  ctx.fillRect(0,0,W,H);
  drawText("CONFERENCE TOURNAMENT SELECT", 260, 80, 20);
  drawText("Up/Down = Choose Conference • Enter = Simulate • B = Back", 160, 110, 14);

  let y = 150;
  conferenceList.forEach((c,i)=>{
    const marker = i === selectedConferenceIndex ? ">" : " ";
    drawText(`${marker} ${c}`, 80, y, 16);
    y += 24;
  });
}

function drawConfTournament() {
  ctx.fillStyle = "#111";
  ctx.fillRect(0,0,W,H);
  drawText("CONFERENCE TOURNAMENT RESULT", 260, 80, 20);
  if (currentConferenceTournament) {
    drawText(`Conference: ${currentConferenceTournament.conference}`, 80, 130, 16);
  }
  drawText(`Champion: ${conferenceChampion || "N/A"}`, 80, 160, 16);
  drawText("Press Enter to simulate National Championship", 80, 200, 14);
  drawText("B = Back", 80, 230, 14);
}

function drawNatTournament() {
  ctx.fillStyle = "#111";
  ctx.fillRect(0,0,W,H);
  drawText("NATIONAL CHAMPIONSHIP", 320, 80, 20);
  drawText(`Champion: ${nationalChampion || "N/A"}`, 80, 130, 16);
  drawText("Sample Bracket Results:", 80, 160, 14);

  let y = 190;
  for (let i = 0; i < Math.min(10, nationalBracketLog.length); i++) {
    drawText(nationalBracketLog[i], 80, y, 12);
    y += 18;
  }

  drawText("Press Enter to return to Season", 80, H-60, 14);
  drawText("B = Back", 80, H-40, 14);
}

// -----------------------------------------------------
//  MAIN UPDATE / RENDER LOOP
// -----------------------------------------------------
function update() {
  if (state === "title") updateTitle();
  else if (state === "mainMenu") updateMainMenu();
  else if (state === "season") updateSeason();
  else if (state === "roster") updateRoster();
  else if (state === "recruit") updateRecruit();
  else if (state === "youth") updateYouth();
  else if (state === "settings") updateSettings();
  else if (state === "match") updateMatch();
  else if (state === "seasonOver") updateSeasonOver();
  else if (state === "confTournamentSelect") updateConfTournamentSelect();
  else if (state === "confTournament") updateConfTournament();
  else if (state === "natTournament") updateNatTournament();

  handleBack();
}

function render() {
  if (state === "title") drawTitle();
  else if (state === "mainMenu") drawMainMenu();
  else if (state === "season") drawSeason();
  else if (state === "roster") drawRoster();
  else if (state === "recruit") drawRecruit();
  else if (state === "youth") drawYouth();
  else if (state === "settings") drawSettings();
  else if (state === "match") drawMatch();
  else if (state === "seasonOver") drawSeasonOver();
  else if (state === "confTournamentSelect") drawConfTournamentSelect();
  else if (state === "confTournament") drawConfTournament();
  else if (state === "natTournament") drawNatTournament();
}

function loop() {
  update();
  render();
  requestAnimationFrame(loop);
}

loop();


    </script>
