function updateOpponentAI() {
  const target = ball.holder || ball;
  opponentsOnField.forEach(d => {
    const dx = target.x - d.x;
    const dy = target.y - d.y;
    const dist = Math.hypot(dx, dy) || 1;
    let speed = d.speed;
    if (currentDifficulty() === "Easy") speed *= 0.9;
    if (currentDifficulty() === "Hard") speed *= 1.1;
    d.vx = (dx/dist)*speed*0.7;
    d.vy = (dy/dist)*speed*0.7;
  });
}

function applyWeather() {
  if (currentWeather() === "Rain") {
    ball.vx *= 0.98;
    ball.vy *= 0.98;
  } else if (currentWeather() === "Snow") {
    ball.vx *= 0.96;
    ball.vy *= 0.96;
  } else if (currentWeather() === "Windy") {
    ball.vx += (Math.random()-0.5)*0.08;
    ball.vy += (Math.random()-0.5)*0.08;
  }
}

function simulateMatch(teamA, teamB) {
  const scoreA = Math.floor(Math.random() * 4);
  const scoreB = Math.floor(Math.random() * 4);
  if (scoreA === scoreB) {
    return Math.random() < 0.5 ? teamA : teamB;
  }
  return scoreA > scoreB ? teamA : teamB;
}

function generateConferenceTournament(confName) {
  const teams = conferences[confName] || [];
  const seeded = teams.slice(0, Math.min(8, teams.length));
  return {
    conference: confName,
    teams: seeded,
    champion: null
  };
}

function playConferenceTournament(t) {
  let teams = t.teams.slice();
  if (teams.length < 2) return teams[0] || null;

  // Quarterfinals
  let semi = [];
  for (let i = 0; i < teams.length/2; i++) {
    semi.push(simulateMatch(teams[i], teams[teams.length-1-i]));
  }

  // Semifinals
  let finals = [];
  finals.push(simulateMatch(semi[0], semi[semi.length-1]));
  if (semi.length > 2) {
    finals.push(simulateMatch(semi[1], semi[semi.length-2]));
  } else if (semi.length === 2) {
    finals.push(semi[1]);
  }

  // Final
  let champion = simulateMatch(finals[0], finals[1] || finals[0]);
  return champion;
}

function getNationalQualifiers() {
  let qualifiers = [];
  for (let conf in conferences) {
    qualifiers.push(...conferences[conf].slice(0, 25));
  }
  return qualifiers;
}

function update() {

  else if (state === "youth") updateYouth();
  else if (state === "settings") updateSettings();
  else if (state === "match") updateMatch();
  else if (state === "seasonOver") updateSeasonOver();
  else if (state === "confTournamentSelect") updateConfTournamentSelect();
  else if (state === "confTournament") updateConfTournament();

  handleBack();
}

function draw() {
  if (state === "title") drawTitle();

  else if (state === "confTournament") drawConfTournament();
  else if (state === "natTournament") drawNatTournament();
}
