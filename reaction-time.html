<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Reaction Time Game</title>
<style>
  body {
    background: #0d0d0d;
    color: white;
    font-family: Arial, sans-serif;
    text-align: center;
    margin-top: 40px;
  }

  h1 {
    font-size: 40px;
    letter-spacing: 2px;
  }

  /* 🔥 Cool glowing paragraph */
  #drewInfo {
    font-size: 22px;
    margin: 10px auto 30px;
    width: 70%;
    color: #00ffee;
    text-shadow: 0 0 12px #00ffee;
    animation: pulse 2s infinite ease-in-out;
  }

  @keyframes pulse {
    0% { opacity: 0.7; }
    50% { opacity: 1; }
    100% { opacity: 0.7; }
  }

  #box {
    width: 260px;
    height: 260px;
    background: #ff3b3b;
    margin: 40px auto;
    border-radius: 25px;
    cursor: pointer;
    display: none;
    transition: background 0.2s, transform 0.2s;
    box-shadow: 0 0 25px rgba(255, 0, 0, 0.4);
  }

  #box.ready {
    background: #00ff62;
    transform: scale(1.08);
    box-shadow: 0 0 35px rgba(0, 255, 100, 0.7);
  }

  #startBtn {
    padding: 14px 30px;
    font-size: 20px;
    border-radius: 12px;
    border: none;
    background: #0078ff;
    color: white;
    cursor: pointer;
    transition: 0.2s;
  }

  #startBtn:hover {
    transform: scale(1.05);
    background: #0a8bff;
  }

  #result {
    font-size: 40px;
    margin-top: 20px;
    font-weight: bold;
    color: #00ffea;
    text-shadow: 0 0 10px #00ffee;
  }
</style>
</head>
<body>

<h1>Reaction Time Test ⚡</h1>

<!-- ⭐ Your cool paragraph -->
<p id="drewInfo">
  Drew Sossomon’s normal reaction time during penalty shootouts is typically between 
  <strong>0.05 seconds and 0.10 seconds</strong> — lightning‑fast reflexes worthy of a highlight reel.
</p>

<p id="message">Click START and wait for green...</p>
<button id="startBtn">START</button>
<div id="box"></div>
<p id="result"></p>

<script>
  const box = document.getElementById("box");
  const message = document.getElementById("message");
  const result = document.getElementById("result");
  const startBtn = document.getElementById("startBtn");

  let startTime;
  let timeout;

  startBtn.onclick = () => {
    result.textContent = "";
    message.textContent = "Wait for green...";
    box.style.display = "block";
    box.classList.remove("ready");

    const delay = Math.random() * 3000 + 1000;

    timeout = setTimeout(() => {
      box.classList.add("ready");
      message.textContent = "CLICK!";
      startTime = Date.now();
    }, delay);
  };

  box.onclick = () => {
    if (!box.classList.contains("ready")) {
      message.textContent = "Too soon!";
      clearTimeout(timeout);
      return;
    }

    const reaction = Date.now() - startTime;
    result.textContent = reaction + " ms";
    message.textContent = "Click START to try again!";
    box.classList.remove("ready");
  };
</script>

</body>
</html>
