<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Drew Sossomon | Full Career Stats</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Big+Shoulders+Display:wght@800&family=Outfit:wght@300;400;700&display=swap" rel="stylesheet">
    
    <style>
        /* --- BRAND VARIABLES --- */
        :root {
            --navy: #0a192f;
            --navy-light: #112240;
            --blue: #007bff;
            --blue-light: #60a5fa;
            --white: #ffffff;
            --bg-gray: #f8fafc;
            --border-gray: #e2e8f0;
        }

        /* --- BASE STYLES --- */
        body {
            margin: 0;
            padding: 0;
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg-gray);
            color: var(--navy);
            line-height: 1.6;
        }

        .stats-container {
            max-width: 1200px;
            margin: 40px auto;
            padding: 20px;
        }

        /* --- TYPOGRAPHY --- */
        .stats-title {
            font-family: 'Big Shoulders Display', sans-serif;
            font-size: 4rem;
            margin: 0;
            text-transform: uppercase;
            text-align: center;
        }

        .stats-subtitle {
            text-align: center;
            font-size: 1.2rem;
            font-weight: 400;
            color: #64748b;
            margin-bottom: 40px;
        }

        .section-label {
            font-family: 'Big Shoulders Display', sans-serif;
            font-size: 2rem;
            margin: 40px 0 20px 0;
            border-bottom: 2px solid var(--blue);
            display: inline-block;
            text-transform: uppercase;
        }

        /* --- BUTTONS --- */
        .btn-action {
            display: inline-block;
            padding: 12px 24px;
            text-decoration: none;
            font-weight: 700;
            border-radius: 6px;
            transition: 0.3s;
            text-transform: uppercase;
            font-size: 0.9rem;
        }

        .main-btn {
            background: var(--blue);
            color: white;
        }

        .main-btn:hover {
            background: var(--navy);
            transform: translateY(-2px);
        }

        .alt-btn {
            background: transparent;
            border: 2px solid var(--blue);
            color: var(--blue);
            margin-left: 10px;
        }

        /* --- VITALS GRID --- */
        .vitals-navy-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 15px;
            background: var(--navy);
            padding: 30px;
            border-radius: 12px;
            color: white;
            box-shadow: 0 10px 30px rgba(10, 25, 47, 0.2);
        }

        .vitals-item {
            font-size: 0.85rem;
            text-transform: uppercase;
            color: #94a3b8;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding-bottom: 5px;
        }

        .vitals-item span {
            display: block;
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--white);
            text-transform: none;
        }

        /* --- THE TABLES --- */
        .table-wrapper {
            width: 100%;
            overflow-x: auto;
            background: var(--white);
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            margin-bottom: 30px;
        }

        .navy-theme-table {
            width: 100%;
            border-collapse: collapse;
            min-width: 800px;
        }

        .navy-theme-table thead tr {
            background: var(--navy);
            color: white;
        }

        .navy-theme-table th {
            padding: 15px;
            text-align: left;
            font-family: 'Big Shoulders Display', sans-serif;
            text-transform: uppercase;
            letter-spacing: 1px;
            border-bottom: 4px solid var(--blue);
        }

        .navy-theme-table td {
            padding: 12px 15px;
            border-bottom: 1px solid var(--border-gray);
        }

        .stat-label {
            font-weight: 700;
            background: #f1f5f9;
            width: 250px;
        }

        .bold-navy {
            font-weight: 800;
            color: var(--navy);
            font-size: 1.1rem;
        }

        .pk-badge {
            background: #16a34a;
            color: white;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 0.75rem;
            margin-left: 5px;
        }

        .record-tag {
            background: var(--blue);
            color: white;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 700;
        }

        /* --- CONTACT SECTION --- */
        .contact-section {
            background: var(--navy);
            padding: 60px 20px;
            border-radius: 15px;
            margin-top: 50px;
        }

        .contact-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            max-width: 1100px;
            margin: 0 auto;
        }

        .contact-card {
            background: var(--navy-light);
            padding: 25px;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.1);
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .card-tag {
            position: absolute;
            top: 15px;
            right: 15px;
            background: var(--blue);
            color: white;
            font-size: 0.7rem;
            padding: 4px 10px;
            border-radius: 4px;
            font-weight: 700;
            text-transform: uppercase;
        }

        .agent-tag { background: #9333ea; }
        .coach-tag { background: #e67e22; }

        .contact-card h3 {
            color: white;
            font-family: 'Big Shoulders Display', sans-serif;
            font-size: 1.6rem;
            margin: 0 0 10px 0;
            text-transform: uppercase;
        }

        .contact-card p {
            color: #94a3b8;
            margin: 5px 0;
            font-size: 0.9rem;
        }

        /* --- RESPONSIVE --- */
        @media (max-width: 768px) {
            .stats-title { font-size: 2.5rem; }
            .vitals-navy-grid { padding: 15px; }
        }
    </style>
</head>
