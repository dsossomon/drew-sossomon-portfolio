<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Drew Sossomon | Full Career Analytics</title>
    <link href="https://fonts.googleapis.com/css2?family=Big+Shoulders+Display:wght@800&family=Outfit:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --navy: #0a192f;
            --navy-light: #112240;
            --energy-blue: #007bff;
            --energy-accent: #60a5fa;
            --white: #ffffff;
            --bg: #f8fafc;
        }
        body { margin: 0; font-family: 'Outfit', sans-serif; background: var(--bg); color: var(--navy); line-height: 1.6; }
        .container { max-width: 1250px; margin: 40px auto; padding: 20px; }
        
        .back-btn { display: inline-block; padding: 12px 25px; background: var(--navy); color: white; text-decoration: none; border-radius: 6px; font-weight: 700; margin-bottom: 25px; border-bottom: 4px solid var(--energy-blue); transition: 0.3s; }
        .back-btn:hover { background: var(--energy-blue); transform: translateX(-5px); }
        
        .header { text-align: center; border-bottom: 6px solid var(--energy-blue); padding-bottom: 25px; margin-bottom: 30px; }
        .header h1 { font-family: 'Big Shoulders Display'; font-size: 5rem; text-transform: uppercase; margin: 0; }

        /* VITALS BAR */
        .vitals-banner { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); 
            gap: 15px; 
            background: var(--navy); 
            color: white; 
            padding: 25px; 
            border-radius: 12px; 
            margin-bottom: 40px;
        }
        .vital-box { border-left: 3px solid var(--energy-blue); padding-left: 15px; }
        .vital-box label { display: block; font-size: 0.7rem; text-transform: uppercase; color: var(--energy-accent); font-weight: 700; }
        .vital-box span { font-size: 1.1rem; font-weight: 700; }

        /* CAREER SUMMARY TILES */
        .summary-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; margin-bottom: 40px; }
        .stat-card { background: white; padding: 20px; border-radius: 12px; border-bottom: 4px solid var(--energy-blue); text-align: center; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .stat-card h3 { margin: 0; font-size: 2.2rem; font-family: 'Big Shoulders Display'; color: var(--navy); }
        .stat-card p { margin: 0; text-transform: uppercase; font-size: 0.75rem; font-weight: 800; color: var(--energy-blue); }

        /* Tables */
        .section-label { font-family: 'Big Shoulders Display'; font-size: 2.5rem; text-transform: uppercase; margin: 40px 0 15px; color: var(--navy); border-left: 6px solid var(--energy-blue); padding-left: 20px; }
        .table-wrapper { background: white; border-radius: 12px; overflow-x: auto; box-shadow: 0 5px 20px rgba(0,0,0,0.05); margin-bottom: 40px; }
        table { width: 100%; border-collapse: collapse; min-width: 1000px; }
        thead { background: var(--navy); color: white; }
        th { padding: 15px; text-align: left; font-family: 'Big Shoulders Display'; text-transform: uppercase; font-size: 0.9rem; letter-spacing: 1px; }
        td { padding: 12px 15px; border-bottom: 1px solid #f1f5f9; }
        
        .highlight { color: var(--energy-blue); font-weight: 800; }
        .success { color: #16a34a; font-weight: 800; }

        /* Contact Cards */
        .contact-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 25px; margin-top: 30px; }
