<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Drew Sossomon | Goalkeeper Interactive Navigator</title>
  <style>
    /* Clean dark theme layout designed to match your GitHub portfolio style */
    body {
      background-color: #0d1117;
      color: #ffffff;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      margin: 0;
      padding: 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }

    h2 {
      margin-bottom: 5px;
      font-weight: 600;
      color: #c9d1d9;
    }

    .subtitle {
      color: #8b949e;
      margin-bottom: 25px;
      font-size: 0.95rem;
      text-align: center;
    }

    /* Video Frame Display Container */
    .navigator-container {
      position: relative;
      width: 100%;
      max-width: 720px;
      aspect-ratio: 16 / 9;
      background-color: #000000;
      border-radius: 8px;
      overflow: hidden;
      border: 1px solid #30363d;
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.6);
      margin-bottom: 20px;
    }

    iframe {
      width: 100%;
      height: 100%;
      border: none;
    }

    /* Challenge Panel UI Card */
    .game-overlay-card {
      width: 100%;
      max-width: 720px;
      background-color: #161b22;
      border: 1px solid #30363d;
      border-radius: 8px;
      padding: 20px;
      box-sizing: border-box;
      text-align: center;
    }

    .step-indicator {
      font-size: 0.8rem;
      color: #58a6ff;
      font-weight: bold;
      letter-spacing: 1px;
      margin-bottom: 10px;
    }

    .prompt-headline {
      font-size: 1.3rem;
      font-weight: 700;
      margin-bottom: 20px;
    }

    .options-stack {
      display: flex;
      gap: 15px;
      width: 100%;
      justify-content: center;
      flex-wrap: wrap;
    }

    .decision-btn {
      flex: 1;
      min-width: 200px;
      background-color: #21262d;
      color: #c9d1d9;
      border: 1px solid #30363d;
      padding: 14px 20px;
      font-size: 1rem;
      font-weight: 600;
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .decision-btn:hover {
      background-color: #30363d;
      color: #ffffff;
      transform: translateY(-2px);
    }

    .feedback {
      margin-top: 15px;
      font-size: 1rem;
      font-weight: 600;
      min-height: 24px;
    }
    .correct-flash { color: #56d364; }
    .wrong-flash { color: #f85149; }
  </style>
</head>
<body>

  <h2>Drew Sossomon: Tactical Navigator</h2>
  <p class="subtitle">Watch the highlight video, then answer the questions below to test your goalkeeper IQ!</p>

  <div class="navigator-container">
    <!-- Correctly formatted Google Drive preview stream -->
    <iframe 
      id="highlights-frame"
      src="https://google.com" 
      allow="autoplay" 
      allowfullscreen>
    </iframe>
  </div>

  <!-- Interactive Control Panel Layout -->
  <div class="game-overlay-card">
    <div class="step-indicator">SCENARIO <span id="current-step">1</span> OF 3</div>
    <div class="prompt-headline" id="question-text">Loading tactical challenge...</div>
    <div class="options-stack" id="buttons-box"></div>
    <div id="feedback-msg" class="feedback"></div>
  </div>

  <script>
    const displayQuestion = document.getElementById('question-text');
    const displayButtons = document.getElementById('buttons-box');
    const currentStepUI = document.getElementById('current-step');
    const feedbackUI = document.getElementById('feedback-msg');

    // =========================================================================
    // GOALKEEPER SCENARIOS CONFIGURATION
    // Feel free to rewrite these questions or add more steps to match your clips!
    // =========================================================================
    const tacticalScenarios = [
      {
        step: 1,
        prompt: "Scenario 1: A high cross is driven right into your 6-yard box traffic. What's the play?",
        choices: [
          { text: "Punch clear over oncoming strikers", isCorrect: true, note: "Correct! Claiming space protects your defensive line." },
          { text: "Drop deep onto the baseline goal line", isCorrect: false, note: "Incorrect. Backing up gives attackers a dangerous close-range target window." }
        ]
      },
      {
        step: 2,
        prompt: "Scenario 2: The opponent's striker breaks past your centerbacks on an open break. What do you do?",
        choices: [
          { text: "Sprint forward to narrow down the target angle", isCorrect: true, note: "Correct! Rushing out cuts shooting angles and forces errors." },
          { text: "Stay stationary on the goal mark", isCorrect: false, note: "Incorrect. Sitting back allows them to cleanly pick an open corner spot." }
        ]
      },
      {
        step: 3,
        prompt: "Scenario 3: You cleanly claim an opponent corner kick. Where do you start your distribution?",
        choices: [
          { text: "Throw a fast distribution line out to the wide winger", isCorrect: true, note: "Correct! Quick distribution catches transition lines off-balance." },
          { text: "Boot a blind clearance down the field center", isCorrect: false, note: "Incorrect. Blind drops frequently return team possession back to them." }
        ]
      }
    ];

    let activeScenarioIndex = 0;

    function runGameEngine() {
      if (activeScenarioIndex >= tacticalScenarios.length) {
        displayQuestion.innerText = "🎉 Navigator Complete! You've matched Drew's goalkeeper vision.";
        displayButtons.innerHTML = '';
        return;
      }

      feedbackUI.innerText = '';
      const currentStage = tacticalScenarios[activeScenarioIndex];
      currentStepUI.innerText = currentStage.step;
      displayQuestion.innerText = currentStage.prompt;
      displayButtons.innerHTML = '';

      currentStage.choices.forEach(btnChoice => {
        const choiceButton = document.createElement('button');
        choiceButton.className = 'decision-btn';
        choiceButton.innerText = btnChoice.text;

        choiceButton.onclick = () => {
          if (btnChoice.isCorrect) {
            feedbackUI.className = "feedback correct-flash";
            feedbackUI.innerText = btnChoice.note;
            setTimeout(() => {
              activeScenarioIndex++;
              runGameEngine();
            }, 2500);
          } else {
            feedbackUI.className = "feedback wrong-flash";
            feedbackUI.innerText = btnChoice.note;
          }
        };
        displayButtons.appendChild(choiceButton);
      });
    }

    runGameEngine();
  </script>

</body>
</html>
