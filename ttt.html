<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Tic Tac Toe</title>

<style>
    body {
        font-family: Arial, sans-serif;
        text-align: center;
        background: black; /* NEW */
        color: #0aa7ff; /* Light energy blue */
    }

    h1 {
        margin-top: 20px;
        color: #0aa7ff;
    }

    #board {
        width: 300px;
        height: 300px;
        margin: 20px auto;
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 5px;
        position: relative;
    }

    .cell {
        width: 100px;
        height: 100px;
        background: white; /* NEW: white tiles */
        display: flex;
        justify-content: center;
        align-items: center;
        font-size: 60px;
        cursor: pointer;
        border-radius: 10px;
        user-select: none;
        border: 2px solid #0aa7ff; /* Blue border */
    }

    .cell:hover {
        background: #d4f0ff; /* Light blue hover */
    }

    .x { color: red; }
    .o { color: #0aa7ff; }

    /* Strike-through line */
    #strike {
        position: absolute;
        width: 0;
        height: 6px;
        background: #0aa7ff;
        top: 0;
        left: 0;
        border-radius: 5px;
        transform-origin: left center;
        transition: 0.4s ease;
        display: none;
    }

    #scoreboard {
        margin-top: 20px;
        font-size: 20px;
        color: #0aa7ff;
    }

    button {
        margin-top: 20px;
        padding: 10px 20px;
        font-size: 18px;
        cursor: pointer;
        background: #0aa7ff;
        color: black; /* NEW: readable on blue */
        border: none;
        border-radius: 8px;
    }

    button:hover {
        background: #0088d6;
    }
</style>
</head>

<body>

<h1>Tic Tac Toe</h1>

<div id="board">
    <div id="strike"></div>
</div>

<div id="scoreboard">
    <p><strong>X Wins:</strong> <span id="xWins">0</span></p>
    <p><strong>O Wins:</strong> <span id="oWins">0</span></p>
    <p><strong>Ties:</strong> <span id="ties">0</span></p>
</div>

<button onclick="resetBoard()">New Game</button>

<script>
    const board = document.getElementById("board");
    const strike = document.getElementById("strike");
    let cells = [];
    let currentPlayer = "X";
    let xWins = 0;
    let oWins = 0;
    let ties = 0;

    const winLines = [
        { combo: [0,1,2], x: 10, y: 50, length: 280, rotate: 0 },
        { combo: [3,4,5], x: 10, y: 150, length: 280, rotate: 0 },
        { combo: [6,7,8], x: 10, y: 250, length: 280, rotate: 0 },

        { combo: [0,3,6], x: 50, y: 10, length: 280, rotate: 90 },
        { combo: [1,4,7], x: 150, y: 10, length: 280, rotate: 90 },
        { combo: [2,5,8], x: 250, y: 10, length: 280, rotate: 90 },

        { combo: [0,4,8], x: 10, y: 10, length: 400, rotate: 45 },
        { combo: [2,4,6], x: 290, y: 10, length: 400, rotate: 135 }
    ];

    function createBoard() {
        board.innerHTML = '<div id="strike"></div>';
        cells = [];
        strike.style.display = "none";

        for (let i = 0; i < 9; i++) {
            const cell = document.createElement("div");
            cell.classList.add("cell");
            cell.addEventListener("click", () => makeMove(i));
            board.appendChild(cell);
            cells.push(cell);
        }
    }

    function makeMove(i) {
        if (cells[i].textContent !== "") return;

        cells[i].textContent = currentPlayer;
        cells[i].classList.add(currentPlayer.toLowerCase());

        const winLine = checkWin(currentPlayer);
        if (winLine) {
            drawStrike(winLine);
            if (currentPlayer === "X") xWins++;
            else oWins++;

            updateScoreboard();
            setTimeout(() => {
                alert(currentPlayer + " wins!");
                resetBoard();
            }, 500);
            return;
        }

        if (cells.every(cell => cell.textContent !== "")) {
            ties++;
            updateScoreboard();
            alert("It's a tie!");
            resetBoard();
            return;
        }

        currentPlayer = currentPlayer === "X" ? "O" : "X";
    }

    function checkWin(player) {
        for (let line of winLines) {
            if (line.combo.every(i => cells[i].textContent === player)) {
                return line;
            }
        }
        return null;
    }

    function drawStrike(line) {
        strike.style.display = "block";
        strike.style.width = line.length + "px";
        strike.style.top = line.y + "px";
        strike.style.left = line.x + "px";
        strike.style.transform = `rotate(${line.rotate}deg)`;
    }

    function updateScoreboard() {
        document.getElementById("xWins").textContent = xWins;
        document.getElementById("oWins").textContent = oWins;
        document.getElementById("ties").textContent = ties;
    }

    function resetBoard() {
        currentPlayer = "X";
        createBoard();
    }

    createBoard();
</script>

</body>
</html>
