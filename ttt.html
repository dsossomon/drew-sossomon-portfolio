<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Tic Tac Toe</title>

<style>
    body {
        font-family: Arial, sans-serif;
        text-align: center;
        background: #f0f0f0;
    }

    h1 {
        margin-top: 20px;
    }

    #board {
        width: 300px;
        height: 300px;
        margin: 20px auto;
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 5px;
    }

    .cell {
        width: 100px;
        height: 100px;
        background: white;
        display: flex;
        justify-content: center;
        align-items: center;
        font-size: 60px;
        cursor: pointer;
        border-radius: 10px;
        user-select: none;
    }

    .x { color: red; }
    .o { color: blue; }

    #scoreboard {
        margin-top: 20px;
        font-size: 20px;
    }

    button {
        margin-top: 20px;
        padding: 10px 20px;
        font-size: 18px;
        cursor: pointer;
    }
</style>
</head>

<body>

<h1>Tic Tac Toe</h1>

<div id="board"></div>

<div id="scoreboard">
    <p><strong>X Wins:</strong> <span id="xWins">0</span></p>
    <p><strong>O Wins:</strong> <span id="oWins">0</span></p>
    <p><strong>Ties:</strong> <span id="ties">0</span></p>
</div>

<button onclick="resetBoard()">New Game</button>

<script>
    const board = document.getElementById("board");
    let cells = [];
    let currentPlayer = "X";
    let xWins = 0;
    let oWins = 0;
    let ties = 0;

    function createBoard() {
        board.innerHTML = "";
        cells = [];

        for (let i = 0; i < 9; i++) {
            const cell = document.createElement("div");
            cell.classList.add("cell");
            cell.addEventListener("click", () => makeMove(i));
            board.appendChild(cell);
            cells.push(cell);
        }
    }

    function makeMove(i) {
        if (cells[i].textContent !== "") return;

        cells[i].textContent = currentPlayer;
        cells[i].classList.add(currentPlayer.toLowerCase());

        if (checkWin(currentPlayer)) {
            if (currentPlayer === "X") xWins++;
            else oWins++;

            updateScoreboard();
            alert(currentPlayer + " wins!");
            resetBoard();
            return;
        }

        if (cells.every(cell => cell.textContent !== "")) {
            ties++;
            updateScoreboard();
            alert("It's a tie!");
            resetBoard();
            return;
        }

        currentPlayer = currentPlayer === "X" ? "O" : "X";
    }

    function checkWin(player) {
        const combos = [
            [0,1,2], [3,4,5], [6,7,8],
            [0,3,6], [1,4,7], [2,5,8],
            [0,4,8], [2,4,6]
        ];

        return combos.some(combo =>
            combo.every(index => cells[index].textContent === player)
        );
    }

    function updateScoreboard() {
        document.getElementById("xWins").textContent = xWins;
        document.getElementById("oWins").textContent = oWins;
        document.getElementById("ties").textContent = ties;
    }

    function resetBoard() {
        currentPlayer = "X";
        createBoard();
    }

    createBoard();
</script>

</body>
</html>
